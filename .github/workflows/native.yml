name: Native Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  build-native:
    name: Build (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            arch: aarch64
            runs-on: macos-15
            target: native.macos.aarch64
          - os: macos
            arch: x86_64
            runs-on: macos-15-intel
            target: native.macos.x86_64
          - os: linux
            arch: x86_64
            runs-on: ubuntu-latest
            target: native.linux.x86_64
          - os: linux
            arch: aarch64
            runs-on: ubuntu-24.04-arm
            target: native.linux.aarch64
          - os: windows
            arch: x86_64
            runs-on: windows-latest
            target: native.windows.x86_64
          - os: linux
            arch: x86_64
            runs-on: ubuntu-latest
            target: native.linux.x86_64
            rhel8: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM
        if: ${{ !matrix.rhel8 }}
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '17'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          components: 'native-image'

      - name: Set up GraalVM (RHEL8 container)
        if: ${{ matrix.rhel8 }}
        shell: bash
        run: |
          set -euo pipefail
          docker pull rockylinux:8

      - name: Build native binary
        env:
          GRAALVM_HOME: ${{ env.GRAALVM_HOME }}
          JAVA_HOME: ${{ env.GRAALVM_HOME }}
        shell: bash
        run: |
          if [[ "${{ matrix.rhel8 || 'false' }}" == "true" ]]; then
            docker run --rm -t \
              -v "${PWD}:/workspace" -w /workspace \
              rockylinux:8 bash -lc '
                set -euo pipefail
                dnf -y install tar gzip curl unzip gcc gcc-c++ make zlib-devel ant git
                # Install GraalVM CE 17 (Linux x64)
                GRAALVM_VERSION=17.0.9
                GRAALVM_TAG=jdk-${GRAALVM_VERSION}
                ASSET_URL=https://github.com/graalvm/graalvm-ce-builds/releases/download/${GRAALVM_TAG}/graalvm-community-jdk-${GRAALVM_VERSION}_linux-x64_bin.tar.gz
                echo "GraalVM URL: ${ASSET_URL}"
                curl -fIL ${ASSET_URL}
                GRAALVM_TGZ=$(basename "$ASSET_URL")
                curl -fL -o /tmp/${GRAALVM_TGZ} ${ASSET_URL}
                mkdir -p /opt/graalvm
                tar -xzf /tmp/${GRAALVM_TGZ} -C /opt/graalvm
                export GRAALVM_HOME=/opt/graalvm/graalvm-community-jdk-${GRAALVM_VERSION}+${GRAALVM_BUILD}
                export JAVA_HOME=$GRAALVM_HOME
                export PATH=$GRAALVM_HOME/bin:$PATH
                gu install native-image
                ant clean native.linux.x86_64
                mv dist/ngsutilsj.linux_x86_64 dist/ngsutilsj.linux_x86_64.rhel8
              '
          else
            export PATH="$GRAALVM_HOME/bin:$PATH"
            ant clean ${{ matrix.target }}
          fi

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: ngsutilsj.${{ matrix.os }}_${{ matrix.arch }}${{ matrix.rhel8 && '.rhel8' || '' }}
          path: dist/ngsutilsj.${{ matrix.os }}_${{ matrix.arch }}*

      - name: Upload JAR artifacts (linux x86_64 only)
        if: matrix.os == 'linux' && matrix.arch == 'x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: ngsutilsj-jar
          path: |
            dist/ngsutilsj
            dist/ngsutilsj*.jar

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Release artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/ngsutilsj*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
